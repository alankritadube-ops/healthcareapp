<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healthcare App - Login</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom right, #d4f7d4, #ffffff, #bdf5c4);
}
.container {
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}
.login-box {
    width: 420px;
    background: white;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #1b8a5a;
}
input {
    width: 100%;
    padding: 12px;
    margin: 12px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 16px;
}
input:focus {
    border-color: #1b8a5a;
    outline: none;
}
.btn {
    width: 100%;
    padding: 12px;
    background: #1b8a5a;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 18px;
    cursor: pointer;
    margin-top: 10px;
}
.btn:hover {
    background: #166e49;
}
.link-box {
    text-align: center;
    margin-top: 18px;
}
.link-box a {
    color: #1b8a5a;
    text-decoration: none;
    font-weight: bold;
}
.link-box a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">
<div class="login-box">
    <h2>Login</h2>

    <!-- ✅ IMPORTANT: Use Flask Route -->
    <form action="/send-otp" method="POST">
        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        <input type="email" name="email" placeholder="Enter Email" required>
        <button class="btn" type="submit">LOGIN</button>
    </form>

    <div class="link-box">
        <p>Don’t have an account?
   <a href="{{ url_for('signup') }}">Signup</a>
</p>

    </div>

</div>
</div>

</body>
</html>
