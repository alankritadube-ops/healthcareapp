<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex justify-center items-center bg-gray-100">

  <div class="w-full max-w-5xl bg-white rounded-2xl shadow-2xl grid grid-cols-2 overflow-hidden">

    <!-- LEFT PANEL -->
    <div class="bg-green-500 text-white flex flex-col justify-center items-center p-12 space-y-6">
      <h2 class="text-4xl font-bold">Welcome Back!</h2>
      <p class="text-center text-lg">
        To keep connected with us please<br>
        login with your personal info
      </p>

      <a href="{{ url_for('login') }}"
         class="border border-white px-10 py-3 rounded-full text-lg hover:bg-white hover:text-green-600 transition">
         SIGN IN
      </a>
    </div>

    <!-- RIGHT PANEL -->
    <div class="p-12 bg-white">

      <h1 class="text-3xl font-bold text-center mb-6 text-green-600">
        Create Account
      </h1>

      <p class="text-center text-gray-500 mb-6">
        Use your email for registration
      </p>

      <!-- SIGNUP FORM -->
      <form action="/signup" method="POST" class="space-y-4">

        <div>
          <label class="text-sm font-semibold">First Name</label>
          <input type="text" name="first_name"
            placeholder="Enter your first name"
            class="w-full mt-2 p-3 border rounded-xl"
            required />
        </div>

        <div>
          <label class="text-sm font-semibold">Last Name</label>
          <input type="text" name="last_name"
            placeholder="Enter your last name"
            class="w-full mt-2 p-3 border rounded-xl"
            required />
        </div>

        <div>
          <label class="text-sm font-semibold">Email</label>
          <input type="email" name="email"
            placeholder="Enter your email"
            class="w-full mt-2 p-3 border rounded-xl"
            required />
        </div>

        <div>
          <label class="text-sm font-semibold">Mobile Number</label>
          <input type="text" name="mobile"
            placeholder="Enter your number"
            class="w-full mt-2 p-3 border rounded-xl"
            required />
        </div>

        <div>
          <label class="text-sm font-semibold">Password</label>
          <input type="password" name="password"
            placeholder="Enter password"
            class="w-full mt-2 p-3 border rounded-xl"
            required />
        </div>

        <div>
          <label class="text-sm font-semibold">Confirm Password</label>
          <input type="password" name="confirm_password"
            placeholder="Re-enter password"
            class="w-full mt-2 p-3 border rounded-xl"
            required />
        </div>

        <button type="submit"
          class="w-full bg-green-500 text-white py-3 rounded-full mt-4 text-lg hover:bg-green-600 transition">
          SIGN UP
        </button>

      </form>
    </div>

  </div>

</body>
</html>
